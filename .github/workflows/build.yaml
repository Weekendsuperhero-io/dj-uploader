name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-15]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache cargo registry and index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-target-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # The Rust crate embeds the frontend via generate_context!, so dist/ must
      # exist before any cargo compilation (clippy, build, test).
      - name: Build frontend
        run: pnpm build

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Build (release)
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --verbose

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --verbose
